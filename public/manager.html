<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Portal | AASTMT</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs"></div>

    <nav class="navbar">
        <div class="logo-container">
            <img src="https://www.aast.edu/en/img/aast-logo.png" alt="AAST Logo" class="logo-img">
            <div>
                <div style="font-weight: 700; color: #004a99; font-size: 1.1rem; letter-spacing: 1px;">AASTMT</div>
                <div style="font-size: 0.7rem; color: #5e728d; text-transform: uppercase;">Branch Managerial Portal</div>
            </div>
        </div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <span id="mgmt-name" style="font-weight: 600; color: #004a99;">Management Office</span>
            <button id="logout-btn" class="glow-button" style="padding: 10px 20px; font-size: 0.8rem; width: auto; background: #ff3366;">Logout</button>
        </div>
    </nav>

    <div class="dashboard-wrap" style="grid-template-columns: 1fr;">
        <div class="main-content">
            <div class="card">
                <h2>🖋️ Final Approval Queue</h2>
                <p style="margin-bottom: 20px; color: var(--text-muted);">The following requests require your final authorization before room confirmation.</p>
                <table>
                    <thead>
                        <tr>
                            <th>Originator</th>
                            <th>Target Facility</th>
                            <th>Date</th>
                            <th>Time Slot</th>
                            <th>Purpose</th>
                            <th>Final Action</th>
                        </tr>
                    </thead>
                    <tbody id="manager-requests-list">
                        <tr><td colspan="6" style="text-align: center;">Scanning for pending authorization...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="manager.js"></script>
</body>
</html>
