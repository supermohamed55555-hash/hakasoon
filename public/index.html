<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AASTMT Room Booking System</title>
    <meta name="description" content="A futuristic, premium room booking system for AASTMT.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="login-container glass-panel">
        <div class="logo-area">
            <div class="hologram-ring"></div>
            <h1>AASTMT</h1>
            <p>Smart Room Booking</p>
        </div>
        
        <form id="login-form">
            <div class="input-group">
                <label for=" academic-email">Academic Email</label>
                <input type="email" id="academic-email" placeholder="e.g. name@staff.aast.edu" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label for="employee-id">Academic ID (9 Digits)</label>
                <input type="number" id="employee-id" placeholder="123456789" required oninput="if(this.value.length > 9) this.value = this.value.slice(0, 9);">
            </div>
            
            <button type="submit" class="glow-button">Verify Identity</button>
            <div id="error-message" class="error-hidden">Invalid Credentials or Unauthorized Domain</div>
        </form>
        
        <div class="hint-text">
            <span>Corporate Policy:</span><br>
            @staff, @admin, @manager, @scertary
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
