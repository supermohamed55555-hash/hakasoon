<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AASTMT Room Booking System</title>
    <meta name="description" content="A futuristic, premium room booking system for AASTMT.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="login-container glass-panel">
        <div class="logo-area">
            <div class="hologram-ring"></div>
            <h1>AASTMT</h1>
            <p>Smart Room Booking</p>
        </div>
        
        <form id="login-form">
            <div class="input-group">
                <label for="employee-id">Employee ID</label>
                <input type="text" id="employee-id" placeholder="e.g. EMP-001" required autocomplete="off">
            </div>
            
            <!-- Bypass complex auth for MVP -->
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="glow-button">Access System</button>
            <div id="error-message" class="error-hidden">Invalid Credentials. Try EMP-001 or EMP-002</div>
        </form>
        
        <div class="hint-text">
            <span>Hackathon Hint:</span>
            Admin: EMP-001 | Employee: EMP-002
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
