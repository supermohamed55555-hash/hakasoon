<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard - AASTMT</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2" style="background: #e056fd;"></div>
    </div>
    
    <div class="dashboard-container" style="position: relative; z-index: 2;">
        <h1 style="margin-bottom: 30px;">Welcome, <span id="user-name">User</span> <a href="#" id="logout-btn" class="logout" style="float: right; color: #ff3366; text-decoration: none; font-size: 14px;">Logout</a></h1>
        
        <div class="card">
            <h2>Book a Room (Blind Request)</h2>
            <form id="booking-form">
                <label>SELECT ROOM</label>
                <select id="room-select" required></select>

                <label>DATE (> 24/48 HOURS CONSTRAINT)</label>
                <input type="date" id="booking-date" required>

                <label>TIME SLOT</label>
                <select id="time-slot" required>
                    <option value="08:00 - 10:00">08:00 - 10:00</option>
                    <option value="10:00 - 12:00">10:00 - 12:00</option>
                    <option value="12:00 - 14:00">12:00 - 14:00</option>
                    <option value="14:00 - 16:00">14:00 - 16:00</option>
                </select>

                <label>PURPOSE OF BOOKING</label>
                <input type="text" id="purpose" placeholder="Brief Purpose (e.g. Workshop)" required>
                
                <!-- Extra Fields for Multi-Purpose Rooms (E-Form Requirements) -->
                <div id="multi-purpose-fields" style="display: none; border-top: 1px solid var(--glass-border); padding-top: 15px; margin-top: 15px;">
                    <p style="color: var(--primary-glow); font-size: 14px; margin-bottom: 10px; font-weight: bold;">🏢 Event Manager Details</p>
                    <input type="text" id="em-name" placeholder="Full Name">
                    <input type="text" id="em-title" placeholder="Job Title">
                    <p style="color: var(--primary-glow); font-size: 14px; margin-bottom: 10px; margin-top:10px; font-weight: bold;">🛠️ Technical Requirements</p>
                    <textarea id="tech-req" placeholder="Specify: Microphones count, Laptop needed, Projector, Video Conference setup, etc." style="height: 80px;"></textarea>
                </div>

                <button type="submit" class="glow-button" id="submit-btn" style="margin-top: 20px;">Submit Request</button>
            </form>
        </div>

        <div class="card">
            <h2>My Booking Requests</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Room</th>
                        <th>Status</th>
                        <th>Admin Feedback</th>
                    </tr>
                </thead>
                <tbody id="requests-list">
                    <tr><td colspan="5">No requests found.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="employee.js"></script>
</body>
</html>
